<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SearchBarbara — Observability</title>
  <link rel="stylesheet" href="/static/observability.css?v={{ asset_v }}" />
</head>
<body>

  <!-- ── Top bar ── -->
  <header class="obs-topbar">
    <div>
      <h1>SearchBarbara Observability</h1>
      <p class="subtitle">Session execution traces</p>
    </div>
    <div class="obs-topbar-right">
      <a href="/" class="obs-back-btn">← Back</a>
      <span class="muted">{{ user_email }}</span>
    </div>
  </header>

  <!-- ── Layout ── -->
  <div class="obs-layout">

    <!-- Sidebar: session list -->
    <aside class="obs-sidebar">
      <div class="obs-sidebar-head">
        <h2>Sessions</h2>
        <input type="text" class="obs-search-input" id="sessionSearch"
               placeholder="Search sessions…" autocomplete="off" />
      </div>
      <div class="obs-session-list" id="sessionList">
        <div class="obs-loading">Loading sessions…</div>
      </div>
    </aside>

    <!-- Main panel -->
    <div class="obs-main" id="mainPanel">
      <div class="obs-placeholder" id="emptyHint">Select a session to view its execution trace</div>
    </div>

  </div>

  <div id="perfBar" class="obs-perfbar"></div>

  <script src="/static/observability.js?v={{ asset_v }}"></script>
</body>
</html>
